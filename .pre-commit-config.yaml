# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.3.0
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
-   repo: local
    hooks:
      - id: pytest-check
        name: Run Pytest
        entry: python -m pytest
        language: system
        pass_filenames: false
        always_run: true
